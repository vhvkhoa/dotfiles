# Toggle mouse on
bind-key M \
  set-option -g mouse on \;\
  display-message 'Mouse: ON'

# Toggle mouse off
bind-key m \
  set-option -g mouse off \;\
  display-message 'Mouse: OFF'

set -g status-right-length 50
set -g status-left-length 20
set -g status-justify left
set -g status-position bottom

set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] #S #[fg=colour233,bg=colour245,bold] #H #[fg=colour233,bg=colour248,bold] %b %d, %H:%M '

set -g status-bg colour234
set -g status-fg colour141
setw -g window-status-current-style fg=colour212,bg=colour238 # active windown color
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour212]#F '
setw -g window-status-format ' #I:#W#F ' # format of not active windows

# pane border
set-option -g pane-border-style fg=colour141
set-option -g pane-active-border-style fg=colour212

set-option -g allow-rename off # for permanently remame windows
set -g renumber-windows on # renumber windows when a window is closed

